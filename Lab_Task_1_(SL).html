<!DOCTYPE html>
<html>
<head>
  <title>Internship Form</title>
</head>
<body>

<center>

<h2>Internship Confirmation Form</h2>

<table>

  <tr>
    <td>Student Name :</td>
    <td><input type="text" name="name">
    </td>
  </tr>

  <tr>
    <td>Email Address :</td>
    <td><input type="email" name="email">
    </td>
  </tr>

  <tr>
    <td>Internship Type- </td>
    <td>

     <input type="radio" name="type" value="onsite"> On-Site
       <input type="radio" name="type" value="remote"> Remote
    </td>
  </tr>

  <tr>
    <td>Duration: </td>
    <td>
    <select name="duration">
    <option>6 Weeks</option>
    <option>3 Months</option>
    </select>
    </td>
  </tr>

  <tr>
    <td>Skills of Interest- </td>
    <td>
      <input type="checkbox" name="skills" value="web"> Web Development
      <input type="checkbox" name="skills" value="data"> Data Analysis 
      <input type="checkbox" name="skills" value="mobile"> Mobile Apps
    </td>
     </tr>

  <tr>
    <td colspan="2" align="center"><input type="submit" value="Submit"></td>
  </tr>

</table>

</center>

</body>
</html>
